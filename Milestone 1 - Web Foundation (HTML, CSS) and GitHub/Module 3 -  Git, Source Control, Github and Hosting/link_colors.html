<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        a:link {
            color: green;
            background-color: transparent;
            text-decoration: none;
        }

        a:visited {
            color: pink;
            background-color: wheat;
            text-decoration: none;
        }
        
        a:hover {
            color: red;
            background-color: yeallow;
            text-decoration: underline;
        }

        a:active {
            color: blue;
            background-color: blueviolet;
            text-decoration: overline;
        }
    </style>
</head>
<body>
    <h2>Link Colors</h2>
    <p>We chan change the default colors of links</p>

    <a href="https://www.w3schools.com/html/html_images.asp">HTML Images</a>
</body>
</html>
