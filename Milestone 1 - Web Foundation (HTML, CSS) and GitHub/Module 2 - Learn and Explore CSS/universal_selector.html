<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>

    <style>
        * {
            color: purple;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <h3>Universal Selector</h3>

    <p>This paragraph is styled using the universal selector.</p>
    <div>This div is also styled using the universal selector.</div>

</body>

</html>
