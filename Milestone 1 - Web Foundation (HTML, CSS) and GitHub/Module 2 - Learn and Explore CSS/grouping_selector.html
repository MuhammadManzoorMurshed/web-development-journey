<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selector</title>

    <style>
        h1,
        .head2,
        h3 {
            color: teal;
            font-family: 'Arial', sans-serif;
        }

        p,
        li,
        #list2 {
            color: maroon;
            font-family: 'Georgia', serif;
        }
    </style>
</head>

<body>
    <h3>Grouping Selector</h3>

    <h1>This is a Heading 1</h1>
    <h2 class="head2">This is a Heading 2</h2>
    <h3>This is a Heading 3</h3>

    <p>This is a paragraph demonstrating grouping selector.</p>

    <ul type="circle">
        <li>List item 1 using grouping selector.</li>
        <li id="list2">List item 2 using grouping selector.</li>
    </ul>
</body>

</html>
